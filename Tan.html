<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>

    <style>
        body{
            background:#e5e5e5;
            font-family: Arial, sans-serif;
        }

        .container{
            width:450px;
            margin:20px auto;
            background:white;
            border-radius:5px;
            padding:20px;
            box-shadow:0 0 5px rgba(0,0,0,0.2);
        }

        .logo{
            text-align:center;
        }

        .logo img{
            width:100px;
        }

        h2{
            text-align:center;
            font-size:18px;
            margin-top:10px;
        }

        hr{
            margin:20px 0;
        }

        .input-box{
            display:flex;
            margin-bottom:15px;
        }

        .input-box input{
            flex:1;
            padding:12px;
            border:1px solid #ccc;
            font-size:16px;
        }

        .icon{
            width:45px;
            background:#eee;
            border:1px solid #ccc;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .remember{
            margin-bottom:15px;
        }

        .login-btn{
            width:48%;
            padding:10px;
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:3px;
            font-size:18px;
            cursor:pointer;
        }

        .student-btn{
            width:100%;
            padding:10px;
            margin-top:10px;
            background:#0d6efd;
            color:white;
            border:none;
            border-radius:3px;
            font-size:18px;
            cursor:pointer;
        }

        .teacher-btn{
            width:100%;
            padding:10px;
            margin-top:10px;
            background:#dc3545;
            color:white;
            border:none;
            border-radius:3px;
            font-size:18px;
            cursor:pointer;
        }

        .forgot{
            margin-top:20px;
        }

        .top-row{
            display:flex;
            justify-content:space-between;
            align-items:center;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="logo">
        <img src="logo.png">
    </div>

    <h2>
        PHẦN MỀM TIN HỌC <br>
        ĐÁNH GIÁ KẾT QUẢ RÈN LUYỆN CHO SINH VIÊN CHÍNH QUY <br>
        TẠI ĐẠI HỌC TRÀ VINH
    </h2>

    <hr>

    <div class="input-box">
        <input type="email" placeholder="Email">
        <div class="icon">✉</div>
    </div>

    <div class="input-box">
        <input type="password" placeholder="Mật khẩu">
        <div class="icon">🔒</div>
    </div>

    <div class="top-row">
        <div class="remember">
           <input type="checkbox"> Nhớ mật khẩu
        </div>

        <button class="login-btn">Đăng nhập</button>
    </div>

    <button class="student-btn">
        Sinh viên (Đăng nhập bằng Email Microsoft)
    </button>

    <button class="teacher-btn">
        Giảng viên (Đăng nhập bằng Email TVU)
    </button>

    <div class="forgot">
        <a href="#">Quên mật khẩu?</a>
    </div>

</div>

</body>
</html>
