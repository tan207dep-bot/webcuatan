<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin đăng ký</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f1f3f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .form-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 650px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .form-header {
            background-color: #8cb154; /* Màu xanh lá trong image_2.png */
            color: black;
            text-align: center;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
        }

        .form-body {
            padding: 30px;
        }

        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .form-group label {
            width: 150px;
            font-weight: bold;
            font-size: 14px;
        }

        .form-group input[type="text"],
        .form-group input[type="date"],
        .form-group input[type="tel"],
        .form-group input[type="email"],
        .form-group select {
            flex: 1;
            border: none;
            border-bottom: 1px solid #000;
            padding: 5px 0;
            outline: none;
            font-size: 14px;
        }

        .form-group input::placeholder {
            color: #aaa;
            font-style: italic;
        }

        .radio-group, .checkbox-group {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        .textarea-group {
            display: block;
            margin-top: 10px;
        }

        .textarea-group label {
            display: block;
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            height: 100px;
            border: 1px solid #000;
            resize: none;
            padding: 10px;
            box-sizing: border-box;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }

        .btn {
            padding: 8px 25px;
            border: 1px solid #000;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            background-color: #8cb154;
        }

        .btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="form-header">Thông tin đăng ký</div>
    
    <form class="form-body">
        <div class="form-group">
            <label>Họ & tên:</label>
            <input type="text" placeholder="Nhập họ tên">
        </div>

        <div class="form-group">
            <label>Ngày/Tháng/Năm sinh:</label>
            <input type="date">
        </div>

        <div class="form-group">
            <label>Giới tính:</label>
            <div class="radio-group">
                <label style="width: auto;"><input type="radio" name="gender"> Nam</label>
                <label style="width: auto;"><input type="radio" name="gender"> Nữ</label>
                <label style="width: auto;"><input type="radio" name="gender"> Khác</label>
            </div>
        </div>

        <div class="form-group">
            <label>Địa chỉ:</label>
            <input type="text" placeholder="Nhập địa chỉ của bạn">
        </div>

        <div class="form-group">
            <label>MSSV:</label>
            <input type="text" placeholder="Nhập mã số sinh viên">
        </div>

        <div class="form-group">
            <label>Lớp:</label>
            <select>
                <option>DA25TTD</option>
                <option>DA24TTD</option>
            </select>
        </div>

        <div class="form-group">
            <label>Số điện thoại:</label>
            <input type="tel" placeholder="Nhập số điện thoại">
        </div>

        <div class="form-group">
            <label>Email:</label>
            <input type="email" placeholder="Nhập email">
        </div>

        <div class="form-group">
            <label>Ảnh đại diện:</label>
            <input type="file">
        </div>

        <div class="form-group">
            <label>Sở trường:</label>
            <div class="checkbox-group">
                <label style="width: auto;"><input type="checkbox"> Thiết kế web</label>
                <label style="width: auto;"><input type="checkbox"> Lập trình web</label>
                <label style="width: auto;"><input type="checkbox"> Thành thạo tiếng Trung</label>
            </div>
        </div>

        <div class="textarea-group">
            <label>Mô tả sơ lược:</label>
            <textarea></textarea>
        </div>

        <div class="btn-group">
            <button type="reset" class="btn">Hủy bỏ</button>
            <button type="submit" class="btn">Đăng ký</button>
        </div>
    </form>
</div>

</body>
</html>
