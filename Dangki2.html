<!DOCTYPE html>
<html lang="vi">
<head>
  <title>Đăng ký tài khoản</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Cập nhật lên Bootstrap 5 cho đồng bộ với Portfolio -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
 
  <style>
    body {
      background: linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .register-container {
      background-color: #ffffff;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 450px;
      margin: 20px;
    }

    h2 {
      text-align: center;
      font-weight: bold;
      color: #333;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    p.subtitle {
      text-align: center;
      color: #777;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-label {
      font-weight: 600;
      color: #555;
    }

    .form-control {
      border-radius: 8px;
      height: 45px;
      border: 1px solid #ddd;
      transition: all 0.3s;
    }

    .form-control:focus {
      box-shadow: 0 0 8px rgba(0, 123, 255, 0.25);
      border-color: #007bff;
    }

    .btn-register {
      width: 100%;
      height: 48px;
      border-radius: 8px;
      background: #007bff;
      border: none;
      color: white;
      font-weight: bold;
      font-size: 16px;
      margin-top: 10px;
      transition: 0.3s;
    }

    .btn-register:hover {
      background: #0056b3;
      transform: translateY(-1px);
    }

    .login-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }

    .login-link a {
      color: #007bff;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="register-container shadow">
  <h2>Tạo tài khoản</h2>
  <p class="subtitle">Nhanh chóng và dễ dàng.</p>
 
<form id="registerForm">
    <div class="mb-3">
      <label for="fullname" class="form-label">Họ và tên</label>
      <input type="text" class="form-control" id="fullname" placeholder="" required>
    </div>

    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
    </div>

    <div class="mb-3">
      <label for="pwd" class="form-label">Mật khẩu</label>
      <input type="password" class="form-control" id="pwd" placeholder="Nhập mật khẩu" required>
    </div>

    <div class="mb-3">
      <label for="re-pwd" class="form-label">Xác nhận mật khẩu</label>
      <input type="password" class="form-control" id="re-pwd" placeholder="Nhập lại mật khẩu" required>
    </div>

    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" id="terms" required>
      <label class="form-check-label" for="terms">Tôi đồng ý với điều khoản</label>
    </div>

    <button type="submit" class="btn btn-register shadow-sm">Đăng ký ngay</button>
  </form>

  <div class="login-link">
    Bạn đã có tài khoản?  <a href="signin.html">Đăng nhập tại đây</a>
  </div>
</div>
  <script src="signup.js"></script>
</body>
</html>
